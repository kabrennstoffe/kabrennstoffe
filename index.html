Diese zusätzliche }); zerstört die komplette Script-Ausführung.

Wenn JavaScript dort abstürzt →
👉 Flatpickr wird nicht richtig initialisiert
👉 Das Datumfeld reagiert nicht

✅ SO MUSS ES KORREKT SEIN

Wichtig:
Es darf keine zusätzliche Klammer vor startKalender() stehen.

🔥 KORREKTE KALENDER-INITIALISIERUNG

Ersetze deinen Kalender-Teil komplett durch diesen:

// --------------------
// KALENDER STARTEN
// --------------------

function startKalender(){

    flatpickr("#datum", {

        dateFormat: "Y-m-d",

        enable: [
            function(date){

                const heute = new Date();
                heute.setHours(0,0,0,0);

                // nur Samstag
                if(date.getDay() !== 6){
                    return false;
                }

                // keine Vergangenheit
                if(date < heute){
                    return false;
                }

                return true;
            }
        ],

        disableMobile: true
    });

}

// WICHTIG: direkt aufrufen
startKalender();


// --------------------
// PLÄTZE ANZEIGE (PRO ZEITFENSTER)
// --------------------
async function aktualisiereZeitPlaetze(){

    const datum = document.getElementById("datum").value;
    const zeit = document.getElementById("zeit").value;
    const info = document.getElementById("plaetzeInfo");
    const btn = document.getElementById("btn");

    if(!datum || !zeit){
        info.innerText = "";
        btn.disabled = false;
        return;
    }

    let { data, error } = await supabaseClient
        .from("buchungen")
        .select("id")
        .eq("datum", datum)
        .eq("zeit", zeit);

    if(error){
        console.log(error);
        return;
    }

    let belegt = data.length;
    let frei = MAX_TERMINE_PRO_ZEITFENSTER - belegt;

    if(frei <= 0){
        info.style.color = "red";
        info.innerText = "🔴 Dieses Zeitfenster ist ausgebucht";
        btn.disabled = true;
    }else{
        info.style.color = "green";
        info.innerText = "🟢 Noch " + frei + " Plätze frei";
        btn.disabled = false;
    }
}

// Events
document.getElementById("datum").addEventListener("change", aktualisiereZeitPlaetze);
document.getElementById("zeit").addEventListener("change", aktualisiereZeitPlaetze);
