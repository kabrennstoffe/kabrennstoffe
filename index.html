<!DOCTYPE html>
<html lang="de">

<head>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminbuchung</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family: Arial, sans-serif;
background:#eef2f7;
padding:15px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
}

h2{
text-align:center;
}

input,select,button{
width:100%;
padding:14px;
margin:6px 0;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#2e5d44;
color:white;
border:none;
font-weight:bold;
}

#meldung{
margin-top:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h2>📅 Termin buchen</h2>

<input type="text" id="datum" placeholder="Datum Wählen" readonly> 
<input type="text" id="vorname" placeholder="Vorname">
<input type="text" id="nachname" placeholder="Nachname">
<input type="tel" id="telefon" placeholder="Telefon">
<input type="text" id="adresse" placeholder="Adresse">

<div id="vorschlaege" style="background:white; border:1px solid #ccc; border-radius:8px; max-height:200px; overflow-y:auto;"></div>

<select id="zeit">
<option value="08-12">08–12</option>
<option value="12-16">12–16</option>
</select>

<div id="plaetzeInfo" style="margin:8px 0; font-weight:bold;"></div>

<button id="btn">Termin anfragen</button>

<div id="meldung"></div>

</div>

<script>

let kundenLat = null;
let kundenLon = null;

// ✅ Distanzfunktion GLOBAL
function berechneEntfernung(lat1, lon1, lat2, lon2){
    const R = 6371;

    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

    return R * c;
}

// --------------------
// Supabase
// --------------------
const supabaseClient = supabase.createClient(
"https://xekjyyiovmmsmmjgrmyz.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhla2p5eWlvdm1tc21tamdybXl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3Mzc5MzAsImV4cCI6MjA4OTMxMzkzMH0.E6aDb2tMI3tByJaZkzl1BCGCvWIoxQrXknn1xo5ocBs"
);

const MAX_PLAETZE_PRO_ZEITFENSTER = 5;

// --------------------
// Plätze prüfen
// --------------------
async function aktualisierePlaetze(){

    const datum = document.getElementById("datum").value;
    const zeit = document.getElementById("zeit").value;
    const info = document.getElementById("plaetzeInfo");

    if(!datum || !zeit){
        info.innerText = "";
        return;
    }

    let { data, error } = await supabaseClient
        .from("buchungen")
        .select("id")
        .eq("datum", datum)
        .eq("zeit", zeit);

    if(error){
        console.log(error);
        return;
    }

    let frei = MAX_PLAETZE_PRO_ZEITFENSTER - data.length;

    if(frei <= 0){
        info.style.color = "red";
        info.innerText = "🔴 Ausgebucht";
    }else{
        info.style.color = "green";
        info.innerText = "🟢 Noch " + frei + " Plätze frei";
    }
}

// --------------------
// Kalender
// --------------------
document.addEventListener("DOMContentLoaded", function(){

    const feld = document.getElementById("datum");

    flatpickr(feld, {
        dateFormat: "Y-m-d",
        minDate: "today",
        enable: [date => date.getDay() === 6]
    });

    feld.addEventListener("change", aktualisierePlaetze);
    document.getElementById("zeit").addEventListener("change", aktualisierePlaetze);
});

// --------------------
// Firma laden
// --------------------
const firmenAdresse = "Marschallstr 2, 44359 Dortmund";
const maximalerRadius = 30;

let firmenLat = null;
let firmenLon = null;

async function ladeFirma(){

    try{
        let url = new URL("https://nominatim.openstreetmap.org/search");
        url.searchParams.set("format", "json");
        url.searchParams.set("limit", "1");
        url.searchParams.set("q", firmenAdresse);

        let res = await fetch(url);
        let data = await res.json();

        if(data.length > 0){
            firmenLat = parseFloat(data[0].lat);
            firmenLon = parseFloat(data[0].lon);
        }

    }catch(e){
        console.log("Fehler Firma:", e);
    }
}

ladeFirma();

// --------------------
// Adress-Suche
// --------------------
let sucheTimeout;

document.getElementById("adresse").addEventListener("input", function () {

    kundenLat = null;
    kundenLon = null;

    clearTimeout(sucheTimeout);

    const query = this.value.trim();
    const box = document.getElementById("vorschlaege");

    if (query.length < 3) {
        box.style.display = "none";
        return;
    }

    sucheTimeout = setTimeout(async () => {

        try {
            let url = new URL("https://nominatim.openstreetmap.org/search");
            url.searchParams.set("format", "json");
            url.searchParams.set("q", query);
            url.searchParams.set("countrycodes", "de");
            url.searchParams.set("limit", "5");

            const res = await fetch(url);
            const data = await res.json();

            box.innerHTML = "";

            if (data.length === 0) {
                box.style.display = "none";
                return;
            }

            data.forEach(e => {

                const div = document.createElement("div");
                div.innerText = e.display_name;
                div.style.padding = "10px";
                div.style.cursor = "pointer";
                div.style.borderBottom = "1px solid #eee";

                div.addEventListener("click", function () {
                    document.getElementById("adresse").value = e.display_name;

                    kundenLat = parseFloat(e.lat);
                    kundenLon = parseFloat(e.lon);

                    box.style.display = "none";
                });

                box.appendChild(div);
            });

            box.style.display = "block";

        } catch (err) {
            console.log("Adressfehler:", err);
        }

    }, 500);
});

// --------------------
// BUTTON
// --------------------
document.getElementById("btn").addEventListener("click", async function(){

    let meldung = document.getElementById("meldung");

    try{

        let datum = document.getElementById("datum").value;
        let vorname = document.getElementById("vorname").value.trim();
        let nachname = document.getElementById("nachname").value.trim();
        let telefon = document.getElementById("telefon").value.trim();
        let adresse = document.getElementById("adresse").value.trim();
        let zeit = document.getElementById("zeit").value;

        if(!datum || !vorname || !nachname || !telefon || !adresse){
            meldung.innerText="Bitte alle Felder ausfüllen";
            return;
        }

        if(!kundenLat || !kundenLon){
            meldung.innerText = "Bitte Adresse aus der Liste auswählen";
            return;
        }

        if(!firmenLat || !firmenLon){
            meldung.innerText = "System lädt noch...";
            return;
        }

        const entfernung = berechneEntfernung(
            firmenLat,
            firmenLon,
            kundenLat,
            kundenLon
        );

        if(entfernung > maximalerRadius){
            meldung.innerText = "❌ Außerhalb (" + entfernung.toFixed(1) + " km)";
            return;
        }

        meldung.innerText="Speichere...";

        const { error } = await supabaseClient
            .from("buchungen")
            .insert([{ datum, zeit, vorname, nachname, telefon, adresse }]);

        if(error){
            console.log(error);
            meldung.innerText="Fehler beim Speichern";
            return;
        }

        meldung.innerText="✅ Termin gespeichert!";

    }catch(err){
        console.log(err);
        meldung.innerText="Technischer Fehler";
    }
});

</script>
</body>
</html>
